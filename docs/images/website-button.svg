<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 56" role="img" aria-label="Visit ytm-player.com">
  <defs>
    <filter id="ytm-website-halo" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="7"/>
    </filter>
  </defs>
  <rect x="20" y="12" width="200" height="32" rx="6" fill="#ff4e45" filter="url(#ytm-website-halo)" opacity="0.7">
    <animate attributeName="opacity" values="0.4;1;0.4" dur="2.6s" repeatCount="indefinite"/>
  </rect>
  <rect x="20" y="12" width="200" height="32" rx="6" fill="#ff4e45"/>
  <text x="120" y="33" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="14" font-weight="600" fill="#ffffff" letter-spacing="0.3">ytm-player.com</text>
</svg>
