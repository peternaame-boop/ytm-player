<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>ytm-player site — A/B prototype</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    background: #0a0a0a;
    color: #fff;
    font-family: 'Inter', sans-serif;
    height: 100vh;
    overflow: hidden;
  }
  .switcher {
    position: fixed; top: 0; left: 0; right: 0;
    background: #000;
    border-bottom: 1px solid #2a2a2a;
    padding: 0.5rem 1rem;
    display: flex; align-items: center; justify-content: center; gap: 0.5rem;
    z-index: 1000;
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.82rem;
  }
  .switcher .label { color: #666; margin-right: 0.5rem; }
  .switcher button {
    background: transparent;
    border: 1px solid #2a2a2a;
    color: #aaa;
    padding: 0.4rem 1rem;
    border-radius: 6px;
    cursor: pointer;
    font-family: inherit;
    font-size: inherit;
    transition: all 0.15s;
  }
  .switcher button:hover { color: #fff; border-color: #ff4e45; }
  .switcher button.active {
    background: #ff4e45;
    color: #0a0a0a;
    border-color: #ff4e45;
    font-weight: 600;
  }
  .frame-wrap {
    position: absolute;
    top: 44px; left: 0; right: 0; bottom: 0;
  }
  iframe {
    border: none;
    width: 100%;
    height: 100%;
    display: none;
  }
  iframe.show { display: block; }
</style>
</head>
<body>

<div class="switcher">
  <span class="label">switch:</span>
  <button id="btn-b" class="active" onclick="show('b')">Pure B</button>
  <button id="btn-plus" onclick="show('plus')">B+ (lean toward C)</button>
  <span class="label" style="margin-left:1rem">·</span>
  <span class="label">use both, then tell me</span>
</div>

<div class="frame-wrap">
  <iframe id="frame-b" class="show" src="/files/prototype-b.html"></iframe>
  <iframe id="frame-plus" src="/files/prototype-b-plus.html"></iframe>
</div>

<script>
  function show(which) {
    document.getElementById('btn-b').classList.toggle('active', which === 'b');
    document.getElementById('btn-plus').classList.toggle('active', which === 'plus');
    document.getElementById('frame-b').classList.toggle('show', which === 'b');
    document.getElementById('frame-plus').classList.toggle('show', which === 'plus');
  }
  // child iframes can post a message to swap
  window.addEventListener('message', (e) => {
    if (e.data && e.data.switchTo) show(e.data.switchTo);
  });
</script>
</body>
</html>
